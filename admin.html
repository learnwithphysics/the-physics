<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founder Dashboard | The Physics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="sidebar">

<h2>THE PHYSICS</h2>

<ul>

<li>📊 Dashboard</li>

<li>👨‍🎓 Students</li>

<li>📚 Lessons</li>

<li>📝 Quiz</li>

<li>📢 Announcements</li>

<li>⚙ Settings</li>

<li>🚪 Logout</li>

</ul>

</div>

<div class="main">

<div class="topbar">

<h1>Founder Dashboard</h1>

<div class="profile">

👑 Founder

</div>

</div>

<div class="cards">

<div class="card">

<h2 id="totalStudents">0</h2>

<p>Total Students</p>

</div>

<div class="card">

<h2 id="onlineStudents">0</h2>

<p>Online Students</p>

</div>

<div class="card">

<h2 id="class9">0</h2>

<p>Class 9</p>

</div>

<div class="card">

<h2 id="class10">0</h2>

<p>Class 10</p>

</div>

</div>

<h2 style="margin-top:40px;">Student List</h2>
<div class="search-box">

<input
type="text"
id="searchStudent"
placeholder="🔍 Search Student by Name or Email">

</div>

<table>

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Progress</th>

<th>Completed Lessons</th>

<th>Status</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
